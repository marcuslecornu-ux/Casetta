<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="140" height="154">
  <!-- Three cypress/olive leaf shapes -->
  <!-- Left leaf -->
  <path d="M60,140 C55,110 48,75 60,30 C72,75 65,110 60,140Z" fill="white"/>
  <line x1="52" y1="140" x2="68" y2="140" stroke="white" stroke-width="1.2"/>
  <!-- Center leaf -->
  <path d="M100,145 C94,110 86,70 100,20 C114,70 106,110 100,145Z" fill="white"/>
  <line x1="91" y1="145" x2="109" y2="145" stroke="white" stroke-width="1.2"/>
  <!-- Right leaf -->
  <path d="M140,140 C135,110 128,75 140,30 C152,75 145,110 140,140Z" fill="white"/>
  <line x1="132" y1="140" x2="148" y2="140" stroke="white" stroke-width="1.2"/>

  <!-- Horizontal divider line -->
  <line x1="30" y1="158" x2="170" y2="158" stroke="white" stroke-width="0.8" opacity="0.7"/>

  <!-- CASETTA text -->
  <text x="100" y="178" font-family="'Lato', Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="6" fill="white" text-anchor="middle">CASETTA</text>

  <!-- FIRENZE text -->
  <text x="100" y="198" font-family="'Lato', Arial, sans-serif" font-size="10" font-weight="300" letter-spacing="5" fill="white" text-anchor="middle" opacity="0.85">FIRENZE</text>
</svg>
