<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Casetta — {% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --casetta-green: #4a7c59;
      --casetta-gold:  #c9a84c;
      --casetta-cream: #f9f5ee;
      --casetta-dark:  #2c2c2c;
    }
    body { background: var(--casetta-cream); color: var(--casetta-dark); font-family: Arial, sans-serif; }
    .sidebar {
      width: 220px; min-height: 100vh; background: var(--casetta-green);
      position: fixed; top: 0; left: 0; padding-top: 1.5rem; z-index: 100;
    }
    .sidebar .brand {
      color: var(--casetta-gold); font-size: 1.3rem; font-weight: bold;
      padding: 0 1.2rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.2);
      margin-bottom: 1rem;
    }
    .sidebar .nav-link {
      color: rgba(255,255,255,0.85); padding: .55rem 1.2rem;
      border-radius: 0; display: flex; align-items: center; gap: .6rem;
    }
    .sidebar .nav-link:hover, .sidebar .nav-link.active {
      background: rgba(255,255,255,0.15); color: #fff;
    }
    .main-content { margin-left: 220px; padding: 2rem; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .card-header { background: var(--casetta-green); color: #fff; border-radius: 12px 12px 0 0 !important; }
    .btn-primary { background: var(--casetta-green); border-color: var(--casetta-green); }
    .btn-primary:hover { background: #3d6b4a; border-color: #3d6b4a; }
    .btn-outline-primary { color: var(--casetta-green); border-color: var(--casetta-green); }
    .btn-outline-primary:hover { background: var(--casetta-green); border-color: var(--casetta-green); }
    .badge-hosted { background: #c9a84c; color: #fff; }
    .stat-card { text-align: center; }
    .stat-card .stat-value { font-size: 2rem; font-weight: bold; color: var(--casetta-green); }
    .stat-card .stat-label { color: #666; font-size: .85rem; }
    .table thead th { background: #f0ede6; font-size: .85rem; }
    .form-label { font-weight: 600; font-size: .88rem; }
    .section-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 1.2rem; color: var(--casetta-dark); }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="brand"><i class="bi bi-house-heart"></i> Casetta</div>
  <nav class="nav flex-column">
    <a href="/" class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">
      <i class="bi bi-grid"></i> Dashboard
    </a>
    <a href="/sales" class="nav-link {% if request.endpoint == 'sales' %}active{% endif %}">
      <i class="bi bi-cup-straw"></i> Drink Sales
    </a>
    <a href="/stock" class="nav-link {% if request.endpoint == 'stock' %}active{% endif %}">
      <i class="bi bi-box-seam"></i> Stock
    </a>
    <a href="/expenses" class="nav-link {% if request.endpoint == 'expenses' %}active{% endif %}">
      <i class="bi bi-receipt"></i> Expenses
    </a>
    <a href="/bookings" class="nav-link {% if request.endpoint == 'bookings' %}active{% endif %}">
      <i class="bi bi-calendar-check"></i> Bookings
    </a>
  </nav>
</div>

<div class="main-content">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ 'success' if category == 'success' else 'warning' }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
