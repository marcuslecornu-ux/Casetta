<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Casetta — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #4a7c59;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,.2);
    }
    .brand { color: #4a7c59; font-size: 1.8rem; font-weight: bold; text-align: center; margin-bottom: .25rem; }
    .subtitle { color: #888; text-align: center; font-size: .9rem; margin-bottom: 2rem; }
    .btn-primary { background: #4a7c59; border-color: #4a7c59; width: 100%; }
    .btn-primary:hover { background: #3d6b4a; border-color: #3d6b4a; }
    .form-control:focus { border-color: #4a7c59; box-shadow: 0 0 0 .2rem rgba(74,124,89,.25); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">🌿 Casetta</div>
    <div class="subtitle">Organic farm &amp; accommodation</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-danger py-2 small">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-bold">Username</label>
        <input type="text" name="username" class="form-control" autofocus autocomplete="username">
      </div>
      <div class="mb-4">
        <label class="form-label fw-bold">Password</label>
        <input type="password" name="password" class="form-control" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
