<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Casetta — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Lato:wght@300;400;700&display=swap');
    body {
      background: #3c2415;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', Arial, sans-serif;
    }
    .login-card {
      background: #f7f3ee;
      border-radius: 4px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 12px 40px rgba(0,0,0,.35);
    }
    .brand { text-align: center; margin-bottom: .5rem; }
    .brand img { width: 130px; }
    .subtitle { color: #999; text-align: center; font-size: .82rem; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 2rem; }
    .form-label { font-weight: 700; font-size: .8rem; text-transform: uppercase; letter-spacing: .06em; color: #5a3825; }
    .btn-primary { background: #3c2415; border-color: #3c2415; width: 100%; letter-spacing: .08em; text-transform: uppercase; font-size: .85rem; }
    .btn-primary:hover { background: #5a3825; border-color: #5a3825; }
    .form-control:focus { border-color: #3c2415; box-shadow: 0 0 0 .2rem rgba(60,36,21,.2); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="110" height="121">
      <path d="M60,140 C55,110 48,75 60,30 C72,75 65,110 60,140Z" fill="#3c2415"/>
      <line x1="52" y1="140" x2="68" y2="140" stroke="#3c2415" stroke-width="1.2"/>
      <path d="M100,145 C94,110 86,70 100,20 C114,70 106,110 100,145Z" fill="#3c2415"/>
      <line x1="91" y1="145" x2="109" y2="145" stroke="#3c2415" stroke-width="1.2"/>
      <path d="M140,140 C135,110 128,75 140,30 C152,75 145,110 140,140Z" fill="#3c2415"/>
      <line x1="132" y1="140" x2="148" y2="140" stroke="#3c2415" stroke-width="1.2"/>
      <line x1="30" y1="158" x2="170" y2="158" stroke="#3c2415" stroke-width="0.8" opacity="0.7"/>
      <text x="100" y="178" font-family="Lato,Arial,sans-serif" font-size="17" font-weight="700" letter-spacing="6" fill="#3c2415" text-anchor="middle">CASETTA</text>
      <text x="100" y="198" font-family="Lato,Arial,sans-serif" font-size="10" font-weight="300" letter-spacing="5" fill="#3c2415" text-anchor="middle" opacity="0.85">FIRENZE</text>
    </svg></div>
    <div class="subtitle">Organic farm &amp; accommodation</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-danger py-2 small">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-bold">Username</label>
        <input type="text" name="username" class="form-control" autofocus autocomplete="username">
      </div>
      <div class="mb-4">
        <label class="form-label fw-bold">Password</label>
        <input type="password" name="password" class="form-control" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
